<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck DB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #1a1a1a;
      color: #e8e0d0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.9rem;
      letter-spacing: 0.04em;
      color: #f0e8d0;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #888;
      font-style: italic;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #333;
      margin-bottom: 2rem;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 0.65rem 1.3rem;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: #ccc;
    }

    .tab-btn.active {
      color: #f0e8d0;
      border-bottom-color: #c8a84b;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .panel-inner {
      background: #242424;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 2rem;
      color: #999;
      font-style: italic;
      text-align: center;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Deck DB</h1>
      <p>store a message in a deck of cards</p>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="encode">Encode</button>
      <button class="tab-btn" data-tab="encode-by-hand">Encode by Hand</button>
      <button class="tab-btn" data-tab="decode">Decode</button>
      <button class="tab-btn" data-tab="decode-by-hand">Decode by Hand</button>
    </nav>

    <div id="encode" class="tab-panel active">
      <div class="panel-inner">Encode panel — coming soon</div>
    </div>

    <div id="encode-by-hand" class="tab-panel">
      <div class="panel-inner">Encode by Hand panel — coming soon</div>
    </div>

    <div id="decode" class="tab-panel">
      <div class="panel-inner">Decode panel — coming soon</div>
    </div>

    <div id="decode-by-hand" class="tab-panel">
      <div class="panel-inner">Decode by Hand panel — coming soon</div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
